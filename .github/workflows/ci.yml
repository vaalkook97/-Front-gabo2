name: CI
on:
  push:
    branches:
      - main
      - master
  pull_request:
jobs:
  backend:
    name: Backend (Spring Boot + Maven)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: empleados_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build and test backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/empleados_db
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          APP_SECURITY_USER: admin
          APP_SECURITY_PASSWORD: admin123
        run: mvn -B verify
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Run unit tests
        run: npm test
  e2e:
    name: E2E (Cypress + Docker Compose)
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build and start app stack
        run: docker compose up -d --build
      - name: Wait for application to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost/login > /dev/null; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting for app at http://localhost/login..."
            sleep 5
          done
          echo "Application did not become ready in time"
          docker compose logs
          exit 1
      - name: Run Cypress E2E tests
        working-directory: frontend
        run: npx cypress run --spec cypress/e2e/login.cy.js
      - name: Docker Compose logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop app stack
        if: always()
        run: docker compose down -v
