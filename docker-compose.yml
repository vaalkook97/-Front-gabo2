services:
  postgres:
    image: postgres:15-alpine
    container_name: pg-dsw
    environment:
      POSTGRES_DB: empleados_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dsw-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: empleados-app
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/empleados_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      APP_SECURITY_USER: admin
      APP_SECURITY_PASSWORD: admin123
      APP_CORS_ALLOWED_ORIGINS: http://nginx
    expose:
      - "8080"
    networks:
      - dsw-net
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: empleados-frontend
    expose:
      - "80"
    networks:
      - dsw-net
    depends_on:
      app:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: empleados-nginx
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_started
      app:
        condition: service_started
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dsw-net

networks:
  dsw-net:
    driver: bridge

volumes:
  postgres_data:
